services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ollive
      POSTGRES_USER: ollive
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ollive_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ollive"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://ollive:${POSTGRES_PASSWORD:-ollive_dev}@postgres:5432/ollive
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OLLIVE_INGEST_ENDPOINT: http://backend:8000/api/v1/ingest
      PII_REDACTION_ENABLED: ${PII_REDACTION_ENABLED:-true}
    ports:
      - "8001:8000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/scripts:/app/scripts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./worker
    environment:
      DATABASE_URL: postgresql+asyncpg://ollive:${POSTGRES_PASSWORD:-ollive_dev}@postgres:5432/ollive
      REDIS_URL: redis://redis:6379
      PII_REDACTION_ENABLED: ${PII_REDACTION_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    ports:
      - "3001:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend

  migrate:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://ollive:${POSTGRES_PASSWORD:-ollive_dev}@postgres:5432/ollive
    depends_on:
      postgres:
        condition: service_healthy
    command: alembic upgrade head
    restart: "no"
    profiles:
      - tools

volumes:
  postgres_data:
  redis_data:
