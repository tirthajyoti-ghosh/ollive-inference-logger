apiVersion: v1
kind: ConfigMap
metadata:
  name: ollive-config
  namespace: ollive
data:
  REDIS_URL: "redis://redis:6379"
  BACKEND_HOST: "0.0.0.0"
  BACKEND_PORT: "8000"
  PII_REDACTION_ENABLED: "true"
  OLLIVE_INGEST_ENDPOINT: "http://backend:8000/api/v1/ingest"
  NEXT_PUBLIC_API_URL: "http://backend:8000"
